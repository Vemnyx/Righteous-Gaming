name: Deploy to GCP VM
on:
  push:
    branches: [ main ]

env:
  GCE_INSTANCE: instance-20260428-115914
  GCE_ZONE: us-central1-a
  GCP_PROJECT: project-28f6d1d8-e4cd-4908-9d7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build React SPA
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Include root favicon in deploy artifact
        run: |
          set -euo pipefail
          cp favicon.ico dist/favicon.ico

      - name: Set up Python (deploy pack)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: deploy/requirements.txt

      - name: Install deploy pack dependencies
        run: pip install -r deploy/requirements.txt

      # Linux amd64 binary for typical GCE VMs; set secrets.GOARCH to arm64 for T2A, etc.
      - name: Build Go server
        env:
          GOARCH: ${{ secrets.GOARCH }}
        run: |
          set -euo pipefail
          arch="${GOARCH:-amd64}"
          cd backend
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build -ldflags="-s -w" -o server ./cmd/server

      # Requires secrets.GCP_SA_KEY with Compute + IAP tunnel access.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy dist to VM
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          python scripts/pack_deploy.py dist /tmp/deploy.tgz

          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="sudo rm -rf /home/${GCE_USERNAME}/app && sudo mkdir -p /home/${GCE_USERNAME}/app && sudo chown -R ${GCE_USERNAME}:${GCE_USERNAME} /home/${GCE_USERNAME}/app"

          gcloud compute scp /tmp/deploy.tgz \
            "${GCE_USERNAME}@${GCE_INSTANCE}:/tmp/deploy.tgz" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet

          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="tar xzf /tmp/deploy.tgz -C /home/${GCE_USERNAME}/app && rm -f /tmp/deploy.tgz"

      # Go binary and SPA both live under ~/app (dist is extracted first, then server).
      - name: Deploy Go app to VM
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          : "${GCE_USERNAME:?Set GCE_USERNAME secret}"

          sed "s/__GCE_USERNAME__/${GCE_USERNAME}/g" deploy/righteous-app.service > /tmp/righteous-app.service

          gcloud compute scp backend/server \
            "${GCE_USERNAME}@${GCE_INSTANCE}:/home/${GCE_USERNAME}/app/server" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet

          gcloud compute scp /tmp/righteous-app.service \
            "${GCE_USERNAME}@${GCE_INSTANCE}:/tmp/righteous-app.service" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet

          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="chmod +x /home/${GCE_USERNAME}/app/server && sudo mv /tmp/righteous-app.service /etc/systemd/system/righteous-app.service && sudo systemctl daemon-reload && sudo systemctl enable righteous-app.service && sudo systemctl restart righteous-app.service"
