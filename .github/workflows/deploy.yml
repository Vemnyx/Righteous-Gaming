name: Deploy to GCP VM
on:
  push:
    branches: [ main ]

env:
  GCE_INSTANCE: instance-20260428-115914
  GCE_ZONE: us-central1-a
  GCP_PROJECT: project-28f6d1d8-e4cd-4908-9d7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build React SPA
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        run: npm run build

      # Requires secrets.GCP_SA_KEY with Compute + IAP tunnel access.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy dist to VM
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          tar czf /tmp/deploy.tgz -C dist .

          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="sudo rm -rf /home/${GCE_USERNAME}/app && sudo mkdir -p /home/${GCE_USERNAME}/app && sudo chown -R ${GCE_USERNAME}:${GCE_USERNAME} /home/${GCE_USERNAME}/app"

          gcloud compute scp /tmp/deploy.tgz \
            "${GCE_USERNAME}@${GCE_INSTANCE}:/tmp/deploy.tgz" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet

          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="tar xzf /tmp/deploy.tgz -C /home/${GCE_USERNAME}/app && rm -f /tmp/deploy.tgz"
