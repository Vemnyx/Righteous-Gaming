name: Deploy to GCP VM
on:
  push:
    branches: [ main ]

env:
  GCE_INSTANCE: instance-20260428-115914
  GCE_ZONE: us-central1-a
  GCP_PROJECT: project-28f6d1d8-e4cd-4908-9d7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Requires secrets.GCP_SA_KEY with Compute + IAP tunnel access if using --tunnel-through-iap
      # (e.g. compute.instances.* + roles/iap.tunnelResourceAccessor as appropriate).
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Files to VM
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="mkdir -p /home/${GCE_USERNAME}/app"

          rsync -avz --delete \
            -e "gcloud compute ssh --zone=${GCE_ZONE} --project=${GCP_PROJECT} --tunnel-through-iap --quiet --ssh-flag=-oStrictHostKeyChecking=accept-new --" \
            ./ "${GCE_USERNAME}@${GCE_INSTANCE}:/home/${GCE_USERNAME}/app/"

      - name: Restart Application
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          gcloud compute ssh "${GCE_USERNAME}@${GCE_INSTANCE}" \
            --zone="${GCE_ZONE}" \
            --project="${GCP_PROJECT}" \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="cd /home/${GCE_USERNAME}/app && if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ] || [ -f compose.yml ] || [ -f compose.yaml ]; then docker compose up -d --build; elif [ -f package.json ] && command -v pm2 >/dev/null 2>&1; then pm2 restart all || pm2 start npm --name app -- start; pm2 save; else echo 'No runtime restart needed (static files or no process manager configured).'; fi"
