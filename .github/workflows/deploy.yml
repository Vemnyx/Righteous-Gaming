name: Deploy to GCP VM
on:
  push:
    branches: [ main ]

env:
  GCE_INSTANCE: instance-20260428-115914
  GCE_ZONE: us-central1-a
  GCP_PROJECT: project-28f6d1d8-e4cd-4908-9d7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React SPA
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Include root favicon in deploy artifact
        run: |
          set -euo pipefail
          cp favicon.ico dist/favicon.ico

      # Linux amd64 binary for typical GCE VMs; set secrets.GOARCH to arm64 for T2A, etc.
      - name: Build Go server
        env:
          GOARCH: ${{ secrets.GOARCH }}
        run: |
          set -euo pipefail
          arch="${GOARCH:-amd64}"
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build -ldflags="-s -w" -o ../deploy-staging-server ./cmd/server

      - name: Prepare deploy bundle
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          : "${GCE_USERNAME:?Set GCE_USERNAME secret}"

          rm -rf deploy-staging
          mkdir -p deploy-staging
          cp -a dist/. deploy-staging/
          cp deploy-staging-server deploy-staging/server
          sed "s/__GCE_USERNAME__/${GCE_USERNAME}/g" deploy/righteous-app.service > deploy-staging/righteous-app.service
          python3 scripts/pack_deploy.py deploy-staging /tmp/deploy.tgz

      # Requires secrets.GCP_SA_KEY with Compute + IAP tunnel access.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # IAP TCP forwarding uses gcloud's bundled Python for bulk upload; NumPy speeds scp/ssh.
      # See https://cloud.google.com/iap/docs/using-tcp-forwarding#increasing_the_tcp_upload_bandwidth
      - name: Install NumPy for gcloud IAP tunnel
        run: bash scripts/setup_gcloud_iap_numpy.sh

      # One SCP + one SSH: dist, server binary, and systemd unit in a single tarball.
      - name: Deploy to VM
        env:
          GCE_USERNAME: ${{ secrets.GCE_USERNAME }}
        run: |
          set -euo pipefail
          : "${GCE_USERNAME:?Set GCE_USERNAME secret}"

          IAP="--zone=${GCE_ZONE} --project=${GCP_PROJECT} --tunnel-through-iap --quiet"
          SSH_HOST="${GCE_USERNAME}@${GCE_INSTANCE}"
          APP_DIR="/home/${GCE_USERNAME}/app"

          gcloud compute scp /tmp/deploy.tgz "${SSH_HOST}:/tmp/deploy.tgz" ${IAP}

          gcloud compute ssh "${SSH_HOST}" ${IAP} \
            --ssh-flag=-oStrictHostKeyChecking=accept-new \
            --command="set -euo pipefail
              sudo rm -rf ${APP_DIR}
              sudo mkdir -p ${APP_DIR}
              sudo chown -R ${GCE_USERNAME}:${GCE_USERNAME} ${APP_DIR}
              tar xzf /tmp/deploy.tgz -C ${APP_DIR}
              rm -f /tmp/deploy.tgz
              chmod +x ${APP_DIR}/server
              sudo mv ${APP_DIR}/righteous-app.service /etc/systemd/system/righteous-app.service
              sudo systemctl daemon-reload
              sudo systemctl enable righteous-app.service
              sudo systemctl restart righteous-app.service"
