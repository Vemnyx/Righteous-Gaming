##
# Default + HTTPS for righteousgaming.team (Vite/React SPA + Go API proxy)
#
# Install on the VM (adjust username/path if needed):
#   sudo cp deploy/nginx-righteousgaming.conf /etc/nginx/sites-available/righteousgaming
#   sudo ln -sf /etc/nginx/sites-available/righteousgaming /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
##

# HTTP: catch-all (IP / unknown host) — serves SPA from app dir
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /home/programmerjake95/app;
    index index.html index.htm;

    server_name _;

    client_max_body_size 50M;
    client_body_timeout 60s;
    send_timeout 60s;

    # Large video uploads -> Go backend (1 GB file + multipart overhead)
    location /api/upload {
        client_max_body_size 1025m;
        client_body_timeout 7200s;
        send_timeout 7200s;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        proxy_request_buffering off;
    }

    # API -> Go backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}

# HTTP: domain — redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name righteousgaming.team;
    return 301 https://$host$request_uri;
}

# HTTPS: domain — SPA + API proxy
server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;

    server_name righteousgaming.team;

    root /home/programmerjake95/app;
    index index.html index.htm;

    ssl_certificate /etc/letsencrypt/live/righteousgaming.team/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/righteousgaming.team/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;
    client_body_timeout 60s;
    send_timeout 60s;

    # Large video uploads -> Go backend (1 GB file + multipart overhead)
    location /api/upload {
        client_max_body_size 1025m;
        client_body_timeout 7200s;
        send_timeout 7200s;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        proxy_request_buffering off;
    }

    # API -> Go backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
