<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#0b0713;font-family:Arial,sans-serif;color:#f4f0fa;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;background:#0b0713;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#140d24;border:1px solid #2f2248;border-radius:14px;padding:28px;">
            <tr>
              <td align="center" style="padding-bottom:16px;">
                <img src="https://storage.googleapis.com/righteous-assets/NameTransparent.png" alt="Righteous Gaming" width="260" style="display:block;width:260px;max-width:100%;height:auto;border:0;" />
              </td>
            </tr>
            <tr>
              <td style="font-size:24px;line-height:1.3;font-weight:700;color:#ffffff;padding-bottom:10px;">You're invited to join the team</td>
            </tr>
            <tr>
              <td style="font-size:15px;line-height:1.6;color:#d9d0ea;padding-bottom:22px;">
                Your account has been invited on Righteous Gaming. Click the button below to finish creating your login and start playing.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:22px;">
                <a href="{{.RegisterURL}}" style="display:inline-block;background:linear-gradient(180deg,#7b4cb8 0%,#5a2f8f 100%);color:#ffffff;text-decoration:none;font-weight:700;font-size:15px;padding:12px 22px;border-radius:10px;">
                  Complete Registration
                </a>
              </td>
            </tr>
            <tr>
              <td style="font-size:13px;line-height:1.5;color:#b9afcd;">
                If the button does not work, copy and paste this link into your browser:<br />
                <a href="{{.RegisterURL}}" style="color:#cab3ff;text-decoration:underline;">{{.RegisterURL}}</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
