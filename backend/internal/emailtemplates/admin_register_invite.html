<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
  </head>
  <body bgcolor="#0b0713" style="margin:0;padding:0;background-color:#0b0713;font-family:Arial,sans-serif;color:#f4f0fa;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" bgcolor="#0b0713" style="padding:32px 16px;background-color:#0b0713;">
      <tr>
        <td align="center" bgcolor="#0b0713" style="background-color:#0b0713;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" bgcolor="#140d24" style="max-width:560px;background-color:#140d24;border:1px solid #2f2248;border-radius:14px;">
            <tr>
              <td align="center" bgcolor="#140d24" style="padding:28px 28px 16px;background-color:#140d24;">
                <img src="https://storage.googleapis.com/righteous-assets/450x450xTransparent.png" alt="Righteous Gaming" width="220" style="display:block;width:220px;max-width:100%;height:auto;border:0;" />
              </td>
            </tr>
            <tr>
              <td bgcolor="#140d24" style="padding:0 28px 10px;background-color:#140d24;font-size:24px;line-height:1.3;font-weight:700;color:#ffffff;">
                You are invited to join the team app
              </td>
            </tr>
            <tr>
              <td bgcolor="#140d24" style="padding:0 28px 22px;background-color:#140d24;font-size:15px;line-height:1.6;color:#d9d0ea;">
                You have been invited to join the Team Righteous Gaming app. Click the button below to finish signing up.
              </td>
            </tr>
            <tr>
              <td align="center" bgcolor="#140d24" style="padding:0 28px 28px;background-color:#140d24;">
                <a href="{{.RegisterURL}}" style="display:inline-block;background-color:#6b3ea8;border:1px solid #8f67c4;color:#ffffff;text-decoration:none;font-weight:700;font-size:15px;line-height:15px;padding:12px 22px;border-radius:10px;">
                  Complete Registration
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
